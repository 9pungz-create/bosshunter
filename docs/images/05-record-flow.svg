<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640">
  <rect width="1100" height="640" fill="#f6f8fb"/>
  <text x="550" y="54" text-anchor="middle" font-family="Tahoma, Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">การบันทึกเวลาหลังบอสตาย</text>
  <text x="550" y="86" text-anchor="middle" font-family="Tahoma, Arial, sans-serif" font-size="16" fill="#526070">ใช้ปุ่มบันทึกเวลา แล้วกรอกคูลดาวน์รูปแบบ HH:MM</text>

  <defs>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#5468ff"/>
    </marker>
  </defs>

  <g font-family="Tahoma, Arial, sans-serif">
    <rect x="95" y="145" width="250" height="180" rx="14" fill="#ffffff" stroke="#d7ddea"/>
    <text x="220" y="190" text-anchor="middle" font-size="20" font-weight="700" fill="#172033">1. กดบันทึกเวลา</text>
    <rect x="155" y="230" width="130" height="42" rx="8" fill="#da373c"/>
    <text x="220" y="257" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">บันทึกเวลา</text>

    <rect x="425" y="145" width="250" height="180" rx="14" fill="#ffffff" stroke="#d7ddea"/>
    <text x="550" y="190" text-anchor="middle" font-size="20" font-weight="700" fill="#172033">2. กรอกคูลดาวน์</text>
    <rect x="470" y="225" width="160" height="44" rx="6" fill="#f3f5f8" stroke="#cfd6e3"/>
    <text x="550" y="253" text-anchor="middle" font-size="18" fill="#172033">01:35</text>

    <rect x="755" y="145" width="250" height="180" rx="14" fill="#ffffff" stroke="#d7ddea"/>
    <text x="880" y="190" text-anchor="middle" font-size="20" font-weight="700" fill="#172033">3. ระบบคำนวณใหม่</text>
    <text x="790" y="238" font-size="15" fill="#465266">เวลาเกิดรอบถัดไป</text>
    <text x="790" y="270" font-size="15" fill="#465266">ผู้บันทึก</text>
    <text x="790" y="302" font-size="15" fill="#465266">ลบข้อความหลัง 1 นาที</text>

    <line x1="355" y1="235" x2="415" y2="235" stroke="#5468ff" stroke-width="4" marker-end="url(#arrow2)"/>
    <line x1="685" y1="235" x2="745" y2="235" stroke="#5468ff" stroke-width="4" marker-end="url(#arrow2)"/>

    <rect x="245" y="410" width="610" height="88" rx="14" fill="#fff8e8" stroke="#f2cf76"/>
    <text x="550" y="444" text-anchor="middle" font-size="18" font-weight="700" fill="#6e5515">ถ้าไม่มีใครบันทึกหลังแจ้งเตือน 45 นาที</text>
    <text x="550" y="474" text-anchor="middle" font-size="15" fill="#6e5515">ระบบจะตั้งคูลดาวน์เป็น 0 และเพิ่มปุ่มตั้งค่าคูลดาวน์ให้กรอกใหม่</text>
  </g>
</svg>
