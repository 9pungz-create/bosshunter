<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680">
  <rect width="1100" height="680" fill="#f6f8fb"/>
  <text x="550" y="52" text-anchor="middle" font-family="Tahoma, Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">แผงจัดกลุ่มเป้าหมายล่าบอส</text>
  <text x="550" y="84" text-anchor="middle" font-family="Tahoma, Arial, sans-serif" font-size="16" fill="#526070">เปิดด้วย /setup_boss และจะแสดงเฉพาะสมาชิกที่ใช้คำสั่ง</text>

  <g font-family="Tahoma, Arial, sans-serif">
    <rect x="230" y="125" width="640" height="460" rx="18" fill="#2f3136"/>
    <rect x="260" y="155" width="580" height="372" rx="12" fill="#36393f"/>
    <text x="292" y="197" font-size="22" font-weight="700" fill="#ffffff">จัดกลุ่มเป้าหมายล่าบอส</text>
    <text x="292" y="230" font-size="15" fill="#cfd5df">เลือกบอสเข้ากลุ่มส่วนตัวได้สูงสุด 5 ตัว</text>
    <text x="292" y="256" font-size="15" fill="#cfd5df">รายชื่อบอสเรียงตามเลเวลและแบ่งหน้า เพราะ Discord แสดงได้สูงสุด 25 รายการต่อเมนู</text>

    <rect x="292" y="292" width="515" height="48" rx="8" fill="#202225" stroke="#555a64"/>
    <text x="316" y="322" font-size="16" fill="#d8dde7">เลือกบอสเข้ากลุ่มเป้าหมาย สูงสุด 5 ตัว</text>
    <path d="M780 310 L792 310 L786 322 Z" fill="#d8dde7"/>

    <rect x="292" y="365" width="160" height="42" rx="8" fill="#3ba55c"/>
    <text x="372" y="392" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">เพิ่ม 5 ตัวใกล้เกิด</text>
    <rect x="468" y="365" width="135" height="42" rx="8" fill="#5865f2"/>
    <text x="535" y="392" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">ดูกลุ่มของฉัน</text>
    <rect x="619" y="365" width="105" height="42" rx="8" fill="#da373c"/>
    <text x="672" y="392" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">ล้างกลุ่ม</text>

    <rect x="292" y="430" width="110" height="40" rx="8" fill="#4f545c"/>
    <text x="347" y="456" text-anchor="middle" font-size="15" fill="#ffffff">หน้า 2/3</text>

    <text x="292" y="505" font-size="14" fill="#9aa3b2">หมายเหตุ: ถ้าใช้ !setup_boss บอทจะส่งแผงนี้ทาง DM</text>
  </g>
</svg>
